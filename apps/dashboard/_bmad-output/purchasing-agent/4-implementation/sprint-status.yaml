# =============================================================================
# Terra Purchasing Agent (Tool 2) - Sprint Plan
# =============================================================================
#
# This file tracks every epic and story from
#   _bmad-output/purchasing-agent/2-planning/epics.md
# against the file-system tracking system. Statuses move left to right:
#   backlog -> ready-for-dev -> in-progress -> review -> done
#
# -----------------------------------------------------------------------------
# PROPOSED SPRINT SLICING
# -----------------------------------------------------------------------------
# Sprint 1  Data foundation. The whole tool sits on this.
#   1-1 stand up the agent on the shared data model
#   1-2 ingest an Invoice (vision and parse)
#   1-3 attribute each line to Ranch, Entity, Account
#   2-1 route low-confidence lines to the internal Review queue
#   2-2 resolve a Review queue item and feed it back
#
# Sprint 2  Legibility engine and the honest band.
#   4-1 normalize every line to a per-unit, same-Active-Ingredient basis
#   4-2 compute and display the single-grower Market Band
#   4-3 surface the Generic Equivalent
#   4-4 Price Band Chart (trends, behind a tap)
#
# Sprint 3  Findings into display-only Recommendations, then close the loop.
#   5-1 flag Overpayment against the band
#   5-2 audit Rebate / Program Pricing for under-credited Rebates
#   5-3 model Prepay timing
#   5-4 surface every finding in the Findings rail
#   5-5 close the loop with predicted versus actual
#
# Sprint 4  Cross-entity spend control and the advisor.
#   6-1 the filterable, exportable Spend Table
#   6-2 Forecast and Committed spend against a per-Entity Spend Budget
#   7-1 grant and revoke PCA read-only visibility
#   7-2 PCA confirm or dispute a flagged line
#
# Sprint 5 (blocked, do not schedule until the blocker clears)  Forecast the season.
#   3-1 forecast a per-product Bill of Materials from the Crop Plan
#   3-2 the Buy Window Calendar home view
#
# -----------------------------------------------------------------------------
# DEPENDENCY ORDER
# -----------------------------------------------------------------------------
# Epic 1 is the data foundation and comes first. Epic 2 (the Review queue) is
# the honesty backbone every downstream number depends on, so it lands right
# after Epic 1 and before any band, audit, or Recommendation. Epic 4 builds on
# Epics 1 and 2. Epic 5 builds on Epics 1, 2, and 4. Epic 6 builds on the
# attributed spend from Epic 1 (and the forecast from Epic 3 for the budget
# view, which degrades gracefully until Epic 3 ships). Epic 7 depends only on
# the views and findings from Epics 4, 5, and 6.
#
# -----------------------------------------------------------------------------
# BLOCKER: Epic 3 (Forecast the season from the Crop Plan)
# -----------------------------------------------------------------------------
# Epic 3 is BLOCKED until the architecture section 4.6 decision is taken. The
# energy schema has no Crop Plan model, so "reused from Tool 1" does not hold
# and forecast-bom.ts has nothing to consume. Settle section 4.6 (the Crop Plan
# is a net-new model, not a reused energy entity) before scheduling 3-1 and 3-2.
# Until then Epic 3 stays in backlog and is sequenced last. Epic 6's
# spend-versus-budget view depends on the Epic 3 forecast for Forecast spend, so
# it ships against Committed spend first and gains Forecast spend once Epic 3
# lands.
# =============================================================================

