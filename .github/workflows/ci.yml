name: CI

# Runs on every push to main and every pull request, so neither of us can merge a change
# that breaks typecheck, lint, or the build of either app. This is the safety net that lets
# two people work the monorepo in parallel without stepping on each other.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy build-time values only. The build never connects to the database (every data
      # route is dynamic) and never uses these secrets - they exist so Prisma/Auth.js module
      # loads don't throw in CI. Real secrets live in Vercel, never here.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_URL_UNPOOLED: "postgresql://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "ci-throwaway-secret-not-used-for-anything"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # npm ci installs every workspace from the single root lockfile; the dashboard's
      # postinstall runs `prisma generate` (no DB needed).
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
